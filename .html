<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Oswald', sans-serif;
}

body{
    background:#0a0a0a;
    color:white;
}

nav{
    background:#111;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #222;
}

.logo{
    font-size:32px;
    font-weight:700;
    letter-spacing:4px;
}

nav a{
    color:#ccc;
    text-decoration:none;
    font-size:15px;
}

.hero{
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero img{
    width:220px;
    margin-bottom:25px;
    border-radius:10px;
}

.hero h1{
    font-size:95px;
    letter-spacing:8px;
}

.hero p{
    color:#999;
    margin-top:8px;
    font-size:18px;
}

.join-btn{
    margin-top:30px;
    padding:14px 40px;
    background:white;
    color:black;
    border:none;
    font-size:16px;
    cursor:pointer;
    border-radius:4px;
    transition:.2s;
    font-weight:700;
}

.join-btn:hover{
    background:#dcdcdc;
}

.shop{
    padding:70px 20px;
    text-align:center;
}

.shop h2{
    font-size:42px;
    margin-bottom:40px;
    letter-spacing:3px;
}

.cards{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    background:#111;
    border:1px solid #2b2b2b;
    width:250px;
    padding:30px 20px;
    border-radius:8px;
}

.card h3{
    font-size:26px;
}

.price{
    font-size:38px;
    margin:15px 0;
    color:white;
}

.card button{
    margin-top:15px;
    padding:12px 30px;
    background:white;
    color:black;
    border:none;
    cursor:pointer;
    border-radius:4px;
    font-weight:700;
}

footer{
    text-align:center;
    padding:30px;
    color:#777;
    border-top:1px solid #1f1f1f;
    margin-top:40px;
}

</style>
</head>
